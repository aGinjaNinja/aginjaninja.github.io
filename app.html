<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.4, maximum-scale=5.0">
<title>Van Nice Site Manager</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c8ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="screen-app" class="screen active" style="display:flex">
  <div class="sidebar" id="sidebar-container"></div>
  <div class="main">
    <div class="topbar">
      <button class="sidebar-toggle" id="sidebar-toggle-btn" onclick="toggleSidebar()" title="Toggle menu">&#9776;</button>
      <h2 id="view-title">Dashboard</h2>
      <div id="topbar-actions"></div>
    </div>
    <div class="view-area" id="view-area"></div>
  </div>
</div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>
<div id="rack-port-tooltip"></div>
<div id="toast"></div>

<!-- Hidden file inputs for all features -->
<input type="file" id="import-input" accept=".json,.zip" style="display:none" onchange="handleImport(event)">
<input type="file" id="photo-upload" accept="image/*,.heic,.heif" multiple style="display:none">
<input type="file" id="photo-capture" accept="image/*,.heic,.heif" capture="environment" style="display:none">
<input type="file" id="photo-replace-input" accept="image/*,.heic,.heif" style="display:none">
<input type="file" id="photo-zip-upload" accept=".zip" style="display:none">
<input type="file" id="csv-input" accept=".csv,.txt" style="display:none" onchange="handleCSVImport(event)">
<input type="file" id="angry-ip-input" accept=".csv,.txt,.xml" style="display:none" onchange="handleAngryIPImport(event)">
<input type="file" id="sitemap-upload" accept="image/*" style="display:none" onchange="uploadSiteMap(event)">

<!-- External libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://unpkg.com/heic2any@0.0.4/dist/heic2any.min.js"></script>

<!-- All application JS -->
<script src="js/core.js"></script>
<script src="js/gdrive.js"></script>
<script src="js/layout.js"></script>
<script src="js/vendors.js"></script>
<script src="js/devices.js"></script>
<script src="js/scan.js"></script>
<script src="js/racks.js"></script>
<script src="js/ports.js"></script>
<script src="js/timelog.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/photos.js"></script>
<script src="js/flowchart.js"></script>
<script src="js/checklist.js"></script>
<script src="js/log.js"></script>
<script src="js/cableruns.js"></script>
<script src="js/fieldmode.js"></script>
<script src="js/sitemap.js"></script>
<script src="js/settings.js"></script>
<script src="js/print.js"></script>
<script>
(async () => {
  // Determine initial view from URL hash
  const hash = window.location.hash.replace('#', '');
  const startView = hash && VIEW_TITLES[hash] ? hash : 'dashboard';

  await initPage(startView);

  // Set up photo event listeners (always available in SPA)
  const photoUpload = document.getElementById('photo-upload');
  const photoCapture = document.getElementById('photo-capture');
  const photoZip = document.getElementById('photo-zip-upload');
  if (photoUpload) photoUpload.addEventListener('change', uploadPhotos);
  if (photoCapture) photoCapture.addEventListener('change', uploadPhotos);
  if (photoZip) photoZip.addEventListener('change', uploadPhotosFromZip);

  // Render the starting view
  _spaRenderView(startView);

  // Handle browser back/forward
  window.addEventListener('popstate', () => {
    const v = window.location.hash.replace('#', '') || 'dashboard';
    if (VIEW_TITLES[v]) _spaRenderView(v);
  });
})();
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
