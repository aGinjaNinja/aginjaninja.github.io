<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.4, maximum-scale=5.0">
<title>Van Nice Site Manager</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c8ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ════════════════ PROJECT SCREEN ════════════════ -->
<div id="screen-projects" class="screen active" style="display:flex">
  <div>
    <div class="proj-header">
      <div class="logo" style="display:flex;flex-direction:column;align-items:center;gap:10px">
        <img src="" id="proj-logo-img" style="width:140px;height:140px;border-radius:50%;object-fit:cover;box-shadow:0 0 36px #c8a84066" alt="VNG Logo">
      </div>
      <h1 style="margin-top:8px"><span>Site Manager</span></h1>
      <p>Van Nice Guys, LLC &nbsp;·&nbsp; Network documentation, rack layout &amp; port assignment</p>
    </div>
    <div class="proj-grid" id="proj-grid"></div>
    <div class="proj-actions" style="justify-content:center;gap:16px;">
      <button class="btn btn-ghost btn-sm" onclick="importData()">⇩ Import Project File</button>
      <button class="btn btn-ghost btn-sm" onclick="gdriveLoad()" style="color:#4285f4;border-color:rgba(66,133,244,.4)">☁ Load from Drive</button>
      <button class="btn btn-ghost btn-sm" onclick="gdriveSaveAll()" style="color:#4285f4;border-color:rgba(66,133,244,.4)">☁ Save All to Drive</button>
      <button class="btn btn-ghost btn-sm" id="vendor-toggle-btn" onclick="toggleVendorPage()">📋 Manufacturers</button>
      <button class="btn btn-ghost btn-sm" onclick="openGlobalSettings()" title="Global Settings" style="display:flex;align-items:center;gap:6px">
        <span style="font-size:15px">⚙</span> Settings &amp; Backup
      </button>
    </div>
    <div id="vendor-list-area" style="display:none;margin-top:20px;max-width:900px;width:100%"></div>
    <div id="proj-backup-status" style="margin-top:12px;text-align:center;font-size:11px;color:var(--text3);font-family:var(--mono)"></div>
    <input type="file" id="import-input" accept=".json,.zip" style="display:none" onchange="handleImport(event)">
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>
<div id="toast"></div>

<script src="js/core.js"></script>
<script src="js/gdrive.js"></script>
<script src="js/vendors.js"></script>
<script src="js/projects.js"></script>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
(async () => {
  await load();
  renderProjects();
  updateBackupStatusBadge();
  const el = document.getElementById('proj-logo-img');
  if (el && typeof LOGO_URI !== 'undefined') el.src = LOGO_URI;
})();
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
